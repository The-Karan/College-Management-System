<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMS - Blog</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/pages.css" />
  <link rel="stylesheet" href="./css/responsive.css" />
</head>
<body class="page-shell">
  <div id="header"></div>

  <section class="page-hero page-hero-center">
    <div class="container reveal">
      <div class="page-tag">Insights</div>
      <h1>Latest Blog & Updates</h1>
      <p>Explore articles on digital campus transformation, automation, security, and administration.</p>
    </div>
  </section>

  <section class="page-section reveal">
    <div class="container">
      <div id="blogGrid" class="blog-page-grid"></div>
      <div id="blogStatus" class="blog-status">Loading blogs...</div>
      <div id="paginationBar" class="pagination-bar"></div>
    </div>
  </section>

  <div id="footer"></div>

  <script src="./js/include.js"></script>
  <script src="./js/main.js"></script>
  <script src="./js/blog.js"></script>
</body>
</html>
