<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMS - Login</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/pages.css" />
  <link rel="stylesheet" href="./css/responsive.css" />
</head>
<body class="page-shell auth-page">
  <div id="header"></div>

  <section class="container auth-layout">
    <div class="auth-left reveal">
      <h1>Sortiq<br><span class="gradient-word">Management Software</span></h1>
      <h2>Integrate Technology With Modern Education</h2>
      <p>
        Integrated School, College & Institute Management System that streamlines
        academics, administration, and operations using modern technology.
      </p>
      <div class="auth-accent"></div>
    </div>

    <div class="card auth-card reveal">
      <h2>Login</h2>
      <form id="loginForm">
        <label class="input-label" for="loginEmail">Email Address</label>
        <div class="auth-input-wrap">
          <span class="left-icon">✉</span>
          <input id="loginEmail" class="auth-input" name="email" type="email" placeholder="name@college.com">
        </div>

        <label class="input-label" for="loginPhone">Phone Number</label>
        <div class="auth-input-wrap">
          <span class="left-icon">📞</span>
          <input id="loginPhone" class="auth-input" name="phone" type="text" placeholder="+91 98765 43210">
        </div>

        <label class="input-label" for="loginPassword">Password</label>
        <div class="auth-input-wrap">
          <span class="left-icon">🔒</span>
          <input id="loginPassword" class="auth-input" name="password" type="password" placeholder="Enter your password" required>
          <button class="right-icon auth-toggle" type="button" aria-label="Show password">👁</button>
        </div>

        <div class="auth-row">
          <label><input id="rememberLogin" type="checkbox"> Remember me</label>
          <a href="./support.html#account-help">Forgot password?</a>
        </div>

        <p id="loginMessage" class="auth-message" aria-live="polite"></p>
        <button class="btn-solid auth-submit pulse-loop" type="submit">Sign In</button>
      </form>
    </div>
  </section>

  <div id="footer"></div>

  <script src="./js/include.js"></script>
  <script src="./js/main.js"></script>
  <script src="./js/login.js"></script>
</body>
</html>
