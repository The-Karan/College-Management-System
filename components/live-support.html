<div class="chat-widget" aria-live="polite">
  <div class="chat-window" id="chatWindow" hidden>
    <div class="chat-header">
      <div>
        <strong>Live Support</strong>
        <p>We are here to help</p>
      </div>
      <button type="button" class="chat-close" id="chatClose" aria-label="Close support chat">×</button>
    </div>

    <div class="chat-body" id="chatBody">
      <div class="chat-message bot-message">👋 Hi! How can we help you today?</div>
    </div>

    <form class="chat-form" id="chatForm">
      <input
        type="text"
        id="chatInput"
        class="chat-input"
        placeholder="Type a message..."
        aria-label="Type a message"
      />
      <button type="submit" class="chat-send">Send</button>
    </form>
  </div>

  <button type="button" class="chat-toggle" id="chatToggle" aria-label="Open support chat" aria-expanded="false">
    <span>💬</span>
  </button>
</div>
